<html>
<head>
  <title>VaseFX ShaderToy Demo</title>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #ui {
      position: fixed; top: 12px; left: 12px;
      display: flex; gap: 10px; align-items: center; z-index: 10;
      font: 13px/1.4 ui-monospace, Menlo, Consolas, monospace; color: #999;
    }
    #ui button {
      background: rgba(20,20,26,.85); color: #ddd;
      border: 1px solid #3a3a45; border-radius: 4px;
      padding: 6px 12px; font: inherit; cursor: pointer;
    }
    #ui button:hover { background: #2a2a32; border-color: #555; }
    #status {
      position: fixed; left: 12px; bottom: 12px; z-index: 10;
      max-width: calc(100vw - 24px); max-height: 50vh; overflow: auto;
      font: 12px/1.5 ui-monospace, Menlo, Consolas, monospace;
      color: #f66; white-space: pre-wrap; margin: 0;
    }
  </style>
</head>

<body>
<canvas id=glCanvas></canvas>
<div id=ui>
  <button id=copyButton>Copy ShaderToy Code</button>
  <span>drag to flip through vases</span>
</div>
<pre id=status></pre>
<script src=shadertoy-shader.js></script>
<script>
'use strict';

// Minimal ShaderToy-compatible harness. It wraps shadertoyShaderCode with the
// same uniforms ShaderToy provides (iResolution, iTime, iMouse), so this page
// previews exactly what the shader will look like when pasted on shadertoy.com.

const canvas = document.getElementById('glCanvas');
const statusElement = document.getElementById('status');

function fail(message)
{
    statusElement.textContent = message;
    document.title = 'VaseFX ShaderToy Demo - ERROR';
    console.error(message);
}

const gl = canvas.getContext('webgl2');
if (!gl)
    fail('WebGL2 is not supported by this browser.');

// same uniform interface ShaderToy provides
const shaderHeader = `#version 300 es
precision highp float;
uniform vec3 iResolution;
uniform float iTime;
uniform vec4 iMouse;
uniform int iFrame;
out vec4 outColor;
`;
const shaderFooter = `
void main() { mainImage(outColor, gl_FragCoord.xy); outColor.a = 1.; }
`;
const headerLineCount = shaderHeader.split('\n').length - 1;

let shaderProgram;
function buildShader()
{
    // fullscreen triangle, no vertex buffer needed in webgl2
    const vertexShader = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vertexShader, `#version 300 es
        void main()
        {
            vec2 p = vec2(gl_VertexID == 1 ? 3. : -1., gl_VertexID == 2 ? 3. : -1.);
            gl_Position = vec4(p, 0, 1);
        }`);
    gl.compileShader(vertexShader);

    const pixelShader = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(pixelShader, shaderHeader + shadertoyShaderCode + shaderFooter);
    gl.compileShader(pixelShader);

    shaderProgram = gl.createProgram();
    gl.attachShader(shaderProgram, vertexShader);
    gl.attachShader(shaderProgram, pixelShader);
    gl.linkProgram(shaderProgram);

    if (!gl.getProgramParameter(shaderProgram, gl.LINK_STATUS))
    {
        const log = gl.getShaderInfoLog(pixelShader) || gl.getProgramInfoLog(shaderProgram);
        fail('SHADER ERROR (line numbers are offset by ' + headerLineCount +
            ' from the ShaderToy paste):\n' + log);
        shaderProgram = 0;
        return;
    }

    document.title = 'VaseFX ShaderToy Demo - OK';
    gl.useProgram(shaderProgram);
}

// mouse with ShaderToy semantics: xy = drag position, zw = click position,
// z is positive only while the button is held
const mouse = {x: 0, y: 0, clickX: 0, clickY: 0, isDown: false};
function canvasPos(e)
{
    const scale = canvas.width / canvas.clientWidth;
    return [e.clientX*scale, canvas.height - e.clientY*scale];
}
canvas.addEventListener('pointerdown', e =>
{
    [mouse.x, mouse.y] = canvasPos(e);
    [mouse.clickX, mouse.clickY] = [mouse.x, mouse.y];
    mouse.isDown = true;
    canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e =>
{
    if (mouse.isDown)
        [mouse.x, mouse.y] = canvasPos(e);
});
canvas.addEventListener('pointerup', e => mouse.isDown = false);

function updateCanvasSize()
{
    // render at native window size like ShaderToy fullscreen;
    // lower the scale if it runs slow on your machine
    const renderScale = 1;
    canvas.width = innerWidth * renderScale;
    canvas.height = innerHeight * renderScale;
}
addEventListener('resize', updateCanvasSize);

const startTime = performance.now();
let frameCount = 0;
function render()
{
    requestAnimationFrame(render);
    if (!shaderProgram)
        return;

    gl.viewport(0, 0, canvas.width, canvas.height);
    const uniform = name => gl.getUniformLocation(shaderProgram, name);
    gl.uniform3f(uniform('iResolution'), canvas.width, canvas.height, 1);
    gl.uniform1f(uniform('iTime'), (performance.now() - startTime)/1e3);
    gl.uniform1i(uniform('iFrame'), frameCount++);
    gl.uniform4f(uniform('iMouse'), mouse.x, mouse.y,
        mouse.isDown ? mouse.clickX : -mouse.clickX, mouse.clickY);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
}

// copy the paste-ready ShaderToy source
const copyButton = document.getElementById('copyButton');
copyButton.onclick = ()=>
{
    const flash = ok =>
    {
        copyButton.textContent = ok ? 'Copied!' : 'Copy failed';
        setTimeout(()=> copyButton.textContent = 'Copy ShaderToy Code', 1500);
    };
    if (navigator.clipboard && navigator.clipboard.writeText)
        navigator.clipboard.writeText(shadertoyShaderCode).then(()=>flash(1), ()=>flash(0));
    else
    {
        // clipboard api needs a secure context, fall back for file://
        const textArea = document.createElement('textarea');
        textArea.value = shadertoyShaderCode;
        document.body.appendChild(textArea);
        textArea.select();
        flash(document.execCommand('copy'));
        textArea.remove();
    }
};

if (gl)
{
    updateCanvasSize();
    buildShader();
    render();
}
</script>
</body>
</html>
